<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>para Danna</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    /* ── Variables ───────────────────────────────────────────────────────── */
    :root {
      --bg: #0d0508;
      --rose: #c97b96;
      --rose-light: #e8b4c8;
      --gold: #c9a257;
      --cream: #f5e8ee;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    /* ── Reset ───────────────────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(180, 60, 100, .18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(100, 20, 50, .12) 0%, transparent 60%);
      color: var(--cream);
      font-family: Georgia, 'Times New Roman', serif;
      overflow-x: hidden;
    }

    /* ── Partículas ──────────────────────────────────────────────────────── */
    #particulas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .p {
      position: absolute;
      top: 110%;
      color: rgba(232, 180, 200, .35);
      animation: flotar linear infinite;
    }

    @keyframes flotar {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: .6;
      }

      100% {
        transform: translateY(-110vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* ── Hero ────────────────────────────────────────────────────────────── */
    #hero {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .hero-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .subtitulo {
      font-size: 1rem;
      letter-spacing: .4em;
      color: var(--rose);
      font-style: italic;
    }

    .nombre {
      font-size: clamp(4rem, 15vw, 9rem);
      font-weight: 400;
      letter-spacing: .05em;
      background: linear-gradient(135deg, var(--rose-light) 0%, var(--gold) 50%, var(--rose-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .linea {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .fecha {
      font-size: .85rem;
      color: rgba(245, 232, 238, .45);
      letter-spacing: .2em;
    }

    /* ── Sección genérica ─────────────────────────────────────────────────── */
    section {
      position: relative;
      z-index: 1;
      padding: 4rem 2rem 6rem;
    }

    .sec-titulo {
      text-align: center;
      font-size: .8rem;
      letter-spacing: .5em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2.5rem;
      font-weight: 400;
    }

    .sec-titulo::before,
    .sec-titulo::after {
      content: '──';
      margin: 0 1rem;
      color: rgba(201, 162, 87, .4);
    }

    /* ── Galería ─────────────────────────────────────────────────────────── */
    .galeria-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    @media (max-width: 600px) {
      .galeria-grid {
        grid-template-columns: 1fr 1fr;
        gap: .5rem;
      }
    }

    .foto-card {
      position: relative;
      aspect-ratio: 4/5;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--glass-border);
      transition: transform .3s, box-shadow .3s;
    }

    .foto-card:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 12px 40px rgba(201, 123, 150, .2);
    }

    .foto-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(.92) saturate(1.1);
      transition: filter .3s;
    }

    .foto-card:hover img {
      filter: brightness(1) saturate(1.2);
    }

    .foto-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(13, 5, 8, .7) 0%, transparent 60%);
      opacity: 0;
      transition: opacity .3s;
      display: flex;
      align-items: flex-end;
      padding: 1rem;
    }

    .foto-card:hover .foto-overlay {
      opacity: 1;
    }

    .foto-caption {
      font-size: .85rem;
      color: var(--cream);
      font-style: italic;
    }

    /* ── Carta ───────────────────────────────────────────────────────────── */
    .carta {
      max-width: 660px;
      margin: 0 auto;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 3rem 3.5rem;
      backdrop-filter: blur(6px);
      line-height: 1.85;
      font-size: 1.05rem;
      color: rgba(245, 232, 238, .88);
    }

    @media (max-width: 600px) {
      .carta {
        padding: 2rem 1.5rem;
        font-size: .95rem;
      }
    }

    .carta p {
      margin-bottom: 1.5rem;
    }

    .carta p:last-child {
      margin-bottom: 0;
    }

    .saludo {
      font-size: 1.25rem;
      color: var(--rose-light);
      font-style: italic;
    }

    .despedida {
      margin-top: 2.5rem !important;
      color: rgba(245, 232, 238, .7);
      font-style: italic;
    }

    .firma {
      font-size: 1.4rem;
      color: var(--rose-light);
      display: block;
      margin-top: .3rem;
    }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .corazon {
      font-size: 1.5rem;
      color: var(--rose);
      display: inline-block;
      animation: latir 1.4s ease-in-out infinite;
    }

    @keyframes latir {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.2);
      }
    }

    /* ── Lightbox ────────────────────────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(13, 5, 8, .92);
      backdrop-filter: blur(12px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      cursor: pointer;
      animation: fadeIn .2s ease;
    }

    #lightbox.open {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    #lightbox img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .6);
      cursor: default;
    }

    #lb-caption {
      margin-top: 1rem;
      font-style: italic;
      color: rgba(245, 232, 238, .6);
      font-size: .9rem;
    }

    #cerrar {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: 1px solid var(--glass-border);
      color: var(--cream);
      font-size: 1.1rem;
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
    }

    #cerrar:hover {
      background: var(--glass);
    }
  </style>
</head>

<body>

  <!-- Partículas -->
  <div id="particulas"></div>

  <!-- Hero -->
  <section id="hero">
    <div class="hero-inner">
      <p class="subtitulo">para ti,</p>
      <h1 class="nombre">Danna</h1>
      <div class="linea"></div>
      <p class="fecha" id="fecha-hoy"></p>
    </div>
  </section>

  <!-- Galería -->
  <section id="galeria">
    <h2 class="sec-titulo">nosotros</h2>
    <div class="galeria-grid" id="galeria-grid">
      <!-- Las fotos se generan desde el script -->
    </div>
  </section>

  <!-- Carta -->
  <section id="carta-sec">
    <h2 class="sec-titulo">una carta para ti</h2>
    <article class="carta">
      <p class="saludo">Mi amor,</p>

      <!-- ═══════════════════════════════════════════════════════════════════
           ESCRIBE TU CARTA AQUÍ — cada <p> es un párrafo nuevo
           ═══════════════════════════════════════════════════════════════════ -->

      <p>
        <!-- Párrafo 1 -->
      </p>

      <p>
        <!-- Párrafo 2 -->
      </p>

      <p>
        <!-- Párrafo 3 -->
      </p>

      <!-- ═══════════════════════════════════════════════════════════════════ -->

      <p class="despedida">
        Con todo mi amor,<br />
        <span class="firma">Jonathan</span>
      </p>
    </article>
  </section>

  <footer>
    <span class="corazon">♡</span>
  </footer>

  <!-- Lightbox -->
  <div id="lightbox">
    <button id="cerrar">✕</button>
    <img id="lb-img" src="" alt="" />
    <p id="lb-caption"></p>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════════════
    // AGREGA TUS FOTOS AQUÍ
    // src   → URL o ruta relativa de la imagen (ej: "fotos/foto1.jpg")
    // caption → texto que aparece al pasar el cursor (déjalo vacío si no quieres)
    // ═══════════════════════════════════════════════════════════════════════
    const fotos = [
      { src: 'uno.jpeg', caption: '' },
      { src: 'tres.jpeg', caption: '' },
      { src: 'siete.jpeg', caption: '' },
      { src: 'seis.jpeg', caption: '' },
      { src: 'ocho.jpeg', caption: '' },
      { src: 'cuatro.jpeg', caption: '' },
      { src: 'dos.jpeg', caption: '' },
      { src: 'cinco.jpeg', caption: '' },
    ];
    // ═══════════════════════════════════════════════════════════════════════

    // Fecha en español
    document.getElementById('fecha-hoy').textContent = '9 de agosto de 2026';

    // Partículas
    const simbolos = ['✦', '♡', '·'];
    const cont = document.getElementById('particulas');
    for (let i = 1; i <= 20; i++) {
      const s = document.createElement('span');
      s.className = 'p';
      s.textContent = simbolos[i % 3];
      s.style.left = ((i * 137.5) % 100) + '%';
      s.style.fontSize = (.6 + (i % 4) * .2) + 'rem';
      s.style.animationDelay = ((i * .7) % 8) + 's';
      s.style.animationDuration = (6 + (i % 5)) + 's';
      cont.appendChild(s);
    }

    // Galería
    const grid = document.getElementById('galeria-grid');
    fotos.forEach((f, i) => {
      const card = document.createElement('div');
      card.className = 'foto-card';
      card.innerHTML = `
        <img src="${f.src}" alt="${f.caption || 'Foto ' + (i + 1)}" loading="lazy" />
        <div class="foto-overlay"><span class="foto-caption">${f.caption}</span></div>`;
      card.addEventListener('click', () => abrirLightbox(i));
      grid.appendChild(card);
    });

    // Lightbox
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbCap = document.getElementById('lb-caption');
    const cerrar = document.getElementById('cerrar');

    function abrirLightbox(i) {
      lbImg.src = fotos[i].src;
      lbImg.alt = fotos[i].caption || '';
      lbCap.textContent = fotos[i].caption || '';
      lb.classList.add('open');
    }
    function cerrarLightbox() { lb.classList.remove('open'); }

    cerrar.addEventListener('click', cerrarLightbox);
    lb.addEventListener('click', e => { if (e.target === lb) cerrarLightbox(); });
    lbImg.addEventListener('click', e => e.stopPropagation());
    document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarLightbox(); });
  </script>
</body>

</html>
